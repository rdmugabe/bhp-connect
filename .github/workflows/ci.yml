name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Prisma client must be generated before typecheck/build — types come
      # from the generated client. Uses a dummy URL since we never connect.
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: Typecheck
        run: npm run typecheck

      # NOTE: `next lint` is intentionally omitted — the project is on
      # ESLint 9 + eslint-config-next 16 (flat config) while Next 14.2's
      # `next lint` still passes legacy options, so it errors. Migrate to a
      # flat eslint.config.mjs and re-add a lint step as a follow-up.

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders — no real secrets needed to compile.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          NEXTAUTH_SECRET: ci-placeholder-secret-not-used-at-runtime
          NEXTAUTH_URL: http://localhost:3000
